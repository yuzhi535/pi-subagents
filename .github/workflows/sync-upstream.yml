name: Sync Upstream

on:
  schedule:
    # 每天 UTC 8:00（北京时间 16:00）检查一次
    - cron: "0 8 * * *"
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch full history for diffing

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/edxeth/pi-subagents.git

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count main..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "new_commits=true" >> $GITHUB_OUTPUT
          else
            echo "new_commits=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate commit summary
        if: steps.check.outputs.new_commits == 'true'
        id: summary
        run: |
          LOG=$(git log --oneline --no-merges main..upstream/main | head -20)
          # Escape newlines for GitHub Actions output
          LOG_ESCAPED="${LOG//$'\n'/'%0A'}"
          echo "log=$LOG_ESCAPED" >> $GITHUB_OUTPUT

          # Generate date tag
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create sync branch
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git checkout -b sync/upstream-${{ steps.summary.outputs.date }} upstream/main
          git push origin sync/upstream-${{ steps.summary.outputs.date }} --force

      - name: Create Pull Request
        if: steps.check.outputs.new_commits == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/upstream-${{ steps.summary.outputs.date }}
          base: main
          title: "⬆️ Upstream sync — ${{ steps.check.outputs.behind }} new commit(s)"
          body: |
            ## Upstream Changes (edxeth/pi-subagents)

            **${{ steps.check.outputs.behind }} new commit(s)** from upstream:

            ```
            ${{ steps.summary.outputs.log }}
            ```

            ---
            🤖 Auto-generated by [sync-upstream workflow](.github/workflows/sync-upstream.yml).

          labels: upstream-sync
          token: ${{ secrets.GITHUB_TOKEN }}
